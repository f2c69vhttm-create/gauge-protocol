<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAUGE PROTOCOL | High-Performance Diagnostics</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --navy: #000d26; }
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        /* PANTALLA DE CARGA (SPLASH) */
        #splash-screen {
            position: fixed; inset: 0; background: #050505; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.5s;
        }
        .loader-bar { width: 200px; height: 2px; background: rgba(212, 175, 55, 0.1); margin-top: 25px; position: relative; overflow: hidden; }
        #progress { height: 100%; width: 0%; background: var(--gold); box-shadow: 0 0 15px var(--gold); transition: width 0.3s; }
        
        /* DASHBOARD PRINCIPAL */
        #main-dashboard { 
            min-height: 100vh; display: flex; flex-direction: column; padding: 1.5rem; 
            opacity: 1; /* Lo dejamos visible por defecto detrás del splash */
        }
        .glass-panel { background: rgba(0, 13, 38, 0.6); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); border-radius: 1.5rem; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #AA8A2E 100%); color: #000d26; font-weight: 700; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="tech-font text-gold tracking-[0.6em] text-3xl mb-1">GAUGE PROTOCOL</h1>
        <p id="loading-text" class="text-[9px] uppercase tracking-[0.4em] text-white/40">Initializing Neural Link...</p>
        <div class="loader-bar"><div id="progress"></div></div>
    </div>

    <div id="main-dashboard" class="max-w-lg mx-auto">
        <header class="flex justify-between items-start mt-8 mb-12">
            <div>
                <h1 class="tech-font text-gold tracking-widest text-xl">GAUGE PROTOCOL</h1>
                <p class="text-[8px] uppercase tracking-[0.5em] opacity-40">System Online</p>
            </div>
            <span class="text-[8px] border border-gold/40 text-gold px-3 py-1 rounded-full uppercase font-bold tracking-widest">Linked</span>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center space-y-10">
            <div class="relative w-64 h-64 rounded-full border border-gold/10 flex items-center justify-center shadow-[0_0_80px_rgba(212,175,55,0.03)]">
                <div class="text-center">
                    <span id="rpmValue" class="tech-font text-6xl font-bold">0</span>
                    <p class="text-[10px] tracking-[0.4em] text-gold/60 uppercase mt-2">RPM Status</p>
                </div>
            </div>

            <button onclick="ejecutarEscaneoVIP()" class="w-full btn-gold py-5 rounded-2xl tech-font tracking-[0.3em] text-[11px] uppercase shadow-lg">
                Execute System Audit
            </button>

            <div id="masterDiag" class="w-full glass-panel p-6 hidden text-left">
                <div id="vipErrorList" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script src="diag.js"></script>
</body>
</html>
