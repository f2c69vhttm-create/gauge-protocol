<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAUGE PROTOCOL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --navy: #000d26; }
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        /* PANTALLA DE CARGA - CAPA SUPERIOR */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        
        /* BARRA DE PROGRESO */
        .loader-bar { width: 220px; height: 2px; background: rgba(212, 175, 55, 0.1); margin-top: 25px; position: relative; }
        #progress { height: 100%; width: 0%; background: var(--gold); box-shadow: 0 0 15px var(--gold); transition: width 0.2s; }
        
        /* DASHBOARD - CAPA INFERIOR */
        #main-dashboard { 
            position: relative; width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; padding: 2rem;
            opacity: 0; transform: scale(0.95); transition: all 1s ease-out;
        }

        .glass-panel { background: rgba(0, 13, 38, 0.6); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); border-radius: 1.5rem; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="tech-font text-gold tracking-[0.6em] text-3xl mb-1">GAUGE PROTOCOL</h1>
        <p id="loading-text" class="text-[9px] uppercase tracking-[0.4em] text-white/40">Initializing Neural Link...</p>
        <div class="loader-bar"><div id="progress"></div></div>
    </div>

    <div id="main-dashboard" class="max-w-lg mx-auto">
        <header class="flex justify-between items-start mt-8 mb-12">
            <div>
                <h1 class="tech-font text-gold tracking-widest text-xl">GAUGE PROTOCOL</h1>
                <p class="text-[8px] uppercase tracking-[0.5em] opacity-40">System Online</p>
            </div>
            <span class="text-[8px] border border-gold/40 text-gold px-3 py-1 rounded-full uppercase font-bold tracking-widest">Linked</span>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center space-y-12">
            <div class="relative w-64 h-64 rounded-full border border-gold/10 flex items-center justify-center shadow-[0_0_80px_rgba(212,175,55,0.03)]">
                <div class="text-center">
                    <span id="rpmValue" class="tech-font text-6xl font-bold">0</span>
                    <p class="text-[10px] tracking-[0.4em] text-gold/60 uppercase mt-2">RPM Status</p>
                </div>
            </div>

            <button onclick="ejecutarEscaneoVIP()" class="w-full bg-gold text-navy py-5 rounded-2xl tech-font tracking-[0.3em] text-[11px] uppercase font-bold shadow-lg shadow-gold/20 active:scale-95 transition-transform">
                Execute System Audit
            </button>

            <div id="masterDiag" class="w-full glass-panel p-6 hidden">
                <div id="vipErrorList" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const messages = ["Authenticating...", "Linking Bluetooth...", "SYSTEM READY"];
            let progress = 0;
            let msgIdx = 0;

            const progBar = document.getElementById('progress');
            const loadTxt = document.getElementById('loading-text');
            const splash = document.getElementById('splash-screen');
            const dash = document.getElementById('main-dashboard');

            const loadInterval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress > 100) progress = 100;
                
                progBar.style.width = progress + '%';
                
                if (progress > (msgIdx + 1) * 33 && msgIdx < messages.length) {
                    loadTxt.innerText = messages[msgIdx];
                    msgIdx++;
                }

                if (progress >= 100) {
                    clearInterval(loadInterval);
                    setTimeout(() => {
                        // ACCIÓN MAESTRA: Deslizar y revelar
                        splash.style.transform = "translateY(-100%)";
                        splash.style.opacity = "0";
                        
                        dash.style.opacity = "1";
                        dash.style.transform = "scale(1)";
                        
                        document.body.style.overflow = "auto";
                    }, 500);
                }
            }, 150);
        });

        function ejecutarEscaneoVIP() {
            const list = document.getElementById('vipErrorList');
            const panel = document.getElementById('masterDiag');
            panel.classList.toggle('hidden');
            list.innerHTML = `<p class="text-[9px] text-gold tech-font mb-4 tracking-widest uppercase">Audit Results:</p>`;

            const faults = [
                {c: "P0300", t: "Misfire Detected", s: "Replace Ignition Coils", u: "CRITICAL"},
                {c: "P0171", t: "Lean Condition", s: "Clean MAF Sensor", u: "WARNING"}
            ];

            faults.forEach(f => {
                const div = document.createElement('div');
                div.className = "p-4 border border-white/5 bg-navy/20 rounded-xl mb-3";
                div.innerHTML = `
                    <div class="flex justify-between text-[10px] font-bold tech-font mb-1">
                        <span class="text-gold">${f.c}</span>
                        <span class="${f.u === 'CRITICAL' ? 'text-red-500' : 'text-yellow-500'}">${f.u}</span>
                    </div>
                    <p class="text-white text-xs font-bold">${f.t}</p>
                    <p class="text-[9px] opacity-50 mt-1 uppercase">Fix: ${f.s}</p>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
